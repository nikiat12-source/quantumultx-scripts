# Quantumult X live stream capture rules - Mobile network ntfy relay edition
# xiaohongmao enhanced build
# Goal:
# 1. capture stream_core from hwcloudlive log report
# 2. capture room_id / anchor_id / limit.key from qituoc api
# 3. relay structured JSON back to desktop

hostname = *.szier2.com, *.sourcelandchina.com, *.hwcloudlive.com, log-collection-new.hwcloudlive.com, api.qituoc.com

^https?:\/\/.*\.hwcloudlive\.com\/v2\/log\/log_report url script-request-body https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_mobile_ntfy_private.js?v=20260416a
^https?:\/\/.*\.szier2\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_mobile_ntfy_private.js?v=20260416a
^https?:\/\/.*\.sourcelandchina\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_mobile_ntfy_private.js?v=20260416a
^https?:\/\/api\.qituoc\.com\/OpenAPI\/v1\/anchor\/(?:hot|nearby|vip).*$ url script-response-body https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_mobile_ntfy_private.js?v=20260416a
^https?:\/\/api\.qituoc\.com\/OpenAPI\/v1\/user\/profile\?.*$ url script-response-body https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_mobile_ntfy_private.js?v=20260416b
^https?:\/\/api\.qituoc\.com\/OpenAPI\/v1\/private\/getPrivateLimit\?.*$ url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_mobile_ntfy_private.js?v=20260416a
