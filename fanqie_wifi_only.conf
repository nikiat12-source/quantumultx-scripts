# Quantumult X 直播源自动抓取规则 - 纯 WiFi 极简版
# 功能: 零 TG 依赖，仅局域网直连 PC，极速轻量！

hostname = *.szier2.com, *.sourcelandchina.com, *.hwcloudlive.com, log-collection-new.hwcloudlive.com

# 1. 抓取华为云日志上报 (针对 POST Body 解析)
^https?:\/\/.*\.hwcloudlive\.com\/v2\/log\/log_report url script-request-body https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_wifi_only.js

# 2. 抓取常规拉流请求 (针对 GET 请求头拦截)
^https?:\/\/.*\.szier2\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_wifi_only.js
^https?:\/\/.*\.sourcelandchina\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_wifi_only.js
