# Quantumult X 直播源自动抓取规则 (v6.4 影子加固版)
# 作者: Antigravity
# 功能: 彻底摧毁缓存，强制引用 v6.4 脚本

hostname = *.szier2.com, *.sourcelandchina.com, *.hwcloudlive.com, log-collection-new.hwcloudlive.com

# [rewrite_local]
# 💡 v6.4 更新：强制指向全新重命名的脚本文件，解决 QuanX 顽固缓存问题

# 1. 抓取华为云日志上报
^https?:\/\/.*\.hwcloudlive\.com\/v2\/log\/log_report url script-request-body https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_detector_v6_4.js

# 2. 抓取常规拉流请求
^https?:\/\/.*\.szier2\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_detector_v6_4.js
^https?:\/\/.*\.sourcelandchina\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_detector_v6_4.js
