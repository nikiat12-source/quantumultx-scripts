# Quantumult X 直播源自动抓取规则 (v6.2 增强版)
# 作者: Antigravity
# 功能: 自动捕捉番茄/华为云直播源并同步至电脑或电报 (双星中继)

hostname = *.szier2.com, *.sourcelandchina.com, *.hwcloudlive.com, log-collection-new.hwcloudlive.com

# [rewrite_local]
# 💡 v6.2 更新：全面引用具备“双星中继”与“火眼金睛”逻辑的 tg 版脚本

# 1. 抓取华为云日志上报 (针对 POST Body 解析)
^https?:\/\/.*\.hwcloudlive\.com\/v2\/log\/log_report url script-request-body https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_detector_tg.js

# 2. 抓取常规拉流请求 (针对 GET 请求头拦截)
^https?:\/\/.*\.szier2\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_detector_tg.js
^https?:\/\/.*\.sourcelandchina\.com\/live\/.* url script-request-header https://raw.githubusercontent.com/nikiat12-source/quantumultx-scripts/main/fanqie_detector_tg.js
